<div class="activities-container">
    <div class="header-actions">
        <h2>Gestión de Actividades</h2>
        <button class="btn-primary">+ Nueva Actividad</button>
    </div>

    <div class="filters">
        <input type="text" placeholder="Buscar actividad..." class="search-input">
        <select class="filter-select">
            <option value="all">Todas las materias</option>
            <option value="math">Matemáticas</option>
            <option value="science">Ciencias</option>
        </select>
    </div>

    <div class="activities-table-wrapper">
        <table class="activities-table">
            <thead>
                <tr>
                    <th>Materia</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Fecha Límite</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Matemáticas</td>
                    <td><span class="tag bg-red">Examen</span></td>
                    <td>Parcial 1: Álgebra Lineal</td>
                    <td>15/Oct 10:00 AM</td>
                    <td><span class="status pending">Pendiente</span></td>
                    <td>
                        <button class="action-btn edit">✏️</button>
                        <button class="action-btn delete">🗑️</button>
                    </td>
                </tr>
                <tr>
                    <td>Ciencias</td>
                    <td><span class="tag bg-blue">Proyecto</span></td>
                    <td>Informe de Laboratorio</td>
                    <td>18/Oct 11:59 PM</td>
                    <td><span class="status doing">En Progreso</span></td>
                    <td>
                        <button class="action-btn edit">✏️</button>
                        <button class="action-btn delete">🗑️</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
